# Symfony virtual host — proxies all .php to php-fpm container
Timeout 300
ProxyTimeout 300

<Proxy "fcgi://php:9000">
    ProxySet timeout=300
</Proxy>

<VirtualHost *:80>
    ServerName  symfony.local
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted
        FallbackResource /index.php
        CGIPassAuth On
    </Directory>

    # Forward Authorization header to FastCGI (needed for JWT Bearer)
    SetEnvIfNoCase ^Authorization$ "(.+)" HTTP_AUTHORIZATION=$1

    # Pass .php requests to php-fpm via FastCGI
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>

    # Forbid direct access to dotfiles
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json application/xml
    </IfModule>

    # Static asset caching
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg     "access plus 1 month"
        ExpiresByType image/png     "access plus 1 month"
        ExpiresByType image/svg+xml "access plus 1 month"
        ExpiresByType text/css      "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
    </IfModule>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
