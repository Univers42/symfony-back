# PostgreSQL — tuned defaults for dev / small-prod
listen_addresses = '*'
max_connections  = 200
shared_buffers   = 256MB
work_mem         = 8MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB

# WAL / durability — relaxed for dev speed
synchronous_commit = off
wal_compression    = on

# Logging to stdout/stderr so `docker logs` works
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500
log_line_prefix = '%t [%p] %u@%d '
log_statement = 'none'

# Safer defaults
password_encryption = scram-sha-256
timezone = 'UTC'
