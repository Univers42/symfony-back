; Application PHP settings — production-tuned, dev-friendly defaults
date.timezone           = UTC
memory_limit            = 512M
upload_max_filesize     = 64M
post_max_size           = 64M
max_execution_time      = 60
max_input_vars          = 4000
expose_php              = Off

; Errors — verbose for dev, override in prod via env
display_errors          = On
display_startup_errors  = On
error_reporting         = E_ALL
log_errors              = On
error_log               = /proc/self/fd/2

; Sessions
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

; Realpath cache — boosts Symfony perf
realpath_cache_size     = 4096K
realpath_cache_ttl      = 600
