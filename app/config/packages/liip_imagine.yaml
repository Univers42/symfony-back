liip_imagine:
    driver: gd
    resolvers:
        default:
            web_path:
                web_root: '%kernel.project_dir%/public'
                cache_prefix: media/cache
    loaders:
        default:
            filesystem:
                data_root: '%kernel.project_dir%/public'
    filter_sets:
        cache: ~
        thumb_sm:
            quality: 80
            filters:
                thumbnail: { size: [320, 240], mode: outbound }
        thumb_md:
            quality: 85
            filters:
                thumbnail: { size: [800, 600], mode: outbound }
