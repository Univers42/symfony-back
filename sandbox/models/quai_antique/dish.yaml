name: Dish
table: dishes
store: postgres

fields:
  - { name: id, type: id }
  - { name: title, type: string, length: 120, assert: [NotBlank] }
  - { name: description, type: text, nullable: true }
  - { name: priceCents, type: int, assert: [PositiveOrZero] }
  - { name: createdAt, type: datetime_immutable, default: now }

relations:
  - { name: category, type: many_to_one, target: Category, nullable: false, inversed_by: dishes }

api:
  operations: [GetCollection, Get, Post, Patch, Delete]

seeds:
  fixed:
    - { id: 1, title: Salade de chèvre chaud, description: 'Mâche, croûtons, miel de Savoie', priceCents: 1200, categoryId: 1 }
    - { id: 2, title: Tarte fine aux légumes, description: 'Légumes du marché, pesto maison', priceCents: 1100, categoryId: 1 }
    - { id: 3, title: Filet de truite du lac, description: 'Beurre blanc, pommes vapeur', priceCents: 2400, categoryId: 2 }
    - { id: 4, title: Diots polenta, description: 'Saucisses fumées, polenta crémeuse', priceCents: 2100, categoryId: 2 }
    - { id: 5, title: Tarte aux myrtilles, description: 'Myrtilles fraîches, pâte sablée', priceCents: 900, categoryId: 3 }
